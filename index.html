<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // ─── Transient HMR Error Suppression (runs before ALL other scripts) ───
      // Vite's dev server pushes module updates over a WebSocket. If a message
      // arrives incomplete (network hiccup, dev server restart, file save during
      // compilation), the HMR client's internal JSON.parse throws
      // "SyntaxError: Unexpected end of input" with no stack trace. This script
      // runs in <head> before any platform-injected or Vite client code, so it
      // patches WebSocket BEFORE any listener is registered.
      (function () {
        function isHMRParseError(e) {
          if (!e) return false;
          if (e instanceof SyntaxError) return /Unexpected end of input|Unexpected token|JSON\.parse/i.test(e.message);
          var msg = (e && e.message) ? e.message : String(e);
          return /SyntaxError/i.test(msg) && /Unexpected end of input|Unexpected token|JSON\.parse/i.test(msg);
        }
        function suppressIfBadJSON(event) {
          if (event && typeof event.data === 'string') {
            var d = event.data.trim();
            // Empty/whitespace-only string → JSON.parse would throw "Unexpected end of input"
            if (d.length === 0) return true;
            // Starts with { or [ but fails to parse → incomplete JSON
            if (d.charCodeAt(0) === 123 || d.charCodeAt(0) === 91) {
              try { JSON.parse(d); }
              catch (e) { return true; }
            }
          }
          return false;
        }
        // Patch addEventListener on WebSocket prototype
        var origAdd = WebSocket.prototype.addEventListener;
        WebSocket.prototype.addEventListener = function (type, listener, options) {
          if (type === 'message' && typeof listener === 'function') {
            var wrapped = function (event) {
              if (suppressIfBadJSON(event)) return;
              try { return listener.call(this, event); }
              catch (e) { if (isHMRParseError(e)) return; throw e; }
            };
            return origAdd.call(this, type, wrapped, options);
          }
          return origAdd.call(this, type, listener, options);
        };
        // Patch onmessage property setter
        var desc = Object.getOwnPropertyDescriptor(WebSocket.prototype, 'onmessage');
        if (desc && desc.set) {
          var origSet = desc.set;
          Object.defineProperty(WebSocket.prototype, 'onmessage', {
            configurable: true,
            enumerable: desc.enumerable,
            get: desc.get,
            set: function (listener) {
              if (typeof listener === 'function') {
                return origSet.call(this, function (event) {
                  if (suppressIfBadJSON(event)) return;
                  try { return listener.call(this, event); }
                  catch (e) { if (isHMRParseError(e)) return; throw e; }
                });
              }
              return origSet.call(this, listener);
            }
          });
        }
        // Patch JSON.parse to return null for empty/incomplete input instead of
        // throwing "Unexpected end of input". This is the root-cause catch — any
        // code (SDK, Vite HMR, fetch responses) that calls JSON.parse('') or
        // JSON.parse('{broken') will get null back instead of throwing an
        // uncatchable SyntaxError with no stack trace.
        var origJSONParse = JSON.parse;
        JSON.parse = function (text, reviver) {
          if (typeof text !== 'string' || text.trim() === '') return null;
          try {
            return origJSONParse.call(this, text, reviver);
          } catch (e) {
            if (e instanceof SyntaxError && /Unexpected end of input/i.test(e.message)) return null;
            throw e;
          }
        };
        // Patch Response.prototype.json for fetch-based calls with empty bodies
        if (typeof Response !== 'undefined' && Response.prototype && Response.prototype.json) {
          var origResponseJson = Response.prototype.json;
          Response.prototype.json = function () {
            return origResponseJson.call(this).catch(function (e) {
              if (e instanceof SyntaxError && /Unexpected end of input/i.test(e.message)) return null;
              throw e;
            });
          };
        }
        // Also catch errors that escape the WebSocket patch via window.onerror.
        // return true suppresses the default error handling.
        window.onerror = function (msg, url, line, col, error) {
          if (isHMRParseError(error)) return true;
          if (typeof msg === 'string' && /Unexpected end of input/i.test(msg)) return true;
          // Don't suppress other errors
        };
      })();
    </script>

    <title>Old RPG Hub — AI Game Master for Classic RPGs</title>
  </head>

  </body>
